<!DOCTYPE html>
<!-- Indica que el documento es HTML5 -->

<html lang="en">
<!-- Elemento raíz del documento -->

<head>
    <meta charset="UTF-8">
    <!-- Permite caracteres especiales -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace la página responsive -->

    <title>Document</title>
    <!-- Título de la pestaña -->
</head>

<body>
<!-- Contenido visible -->

    <!-- ================== TEORÍA DE LISTAS ================== -->

    <!-- <ul>: "Unordered List" (lista desordenada) -->
    <!-- Muestra elementos con viñetas (•) -->

    <ul>
        <!-- <li>: "List Item" (elemento de lista) -->
        <!-- Cada <li> representa un elemento dentro de la lista -->

        <li>Elemento 1</li>
        <li>Elemento 2</li>
        <li>Elemento 3</li>
    </ul>

    <!-- ================== CONCEPTOS CLAVE ================== -->

    <!-- 1. <ul> agrupa elementos sin orden específico -->
    <!-- 2. <li> define cada ítem -->
    <!-- 3. Se pueden anidar listas dentro de otras -->
    <!-- 4. Se pueden cambiar estilos con CSS (tipo de viñeta) -->

</body>
</html>
