<!DOCTYPE html>
<!--Indica al navegador que este documento está escrito en HTML5.
No es una etiqueta como tal, sino una declaración que ayuda a que el navegador interprete correctamente el contenido-->

<html lang="en">
<!--Es la etiqueta raíz de todo el documento HTML.
Todo el contenido debe ir dentro de ella.-->

<head>
<!--Contiene información no visible directamente en la página, pero importante para el funcionamiento del sitio.-->

    <meta charset="UTF-8">
    <!--Define la codificación de caracteres.
UTF-8 permite usar acentos, ñ, símbolos, etc.-->

    <meta name="viewport" 
    content="width=device-width, initial-scale=1.0">
    <!--Hace que la página sea responsive (adaptable a móviles).-->

    <title>Document</title>
<!--Define el título de la página.
Es lo que aparece en la pestaña del navegador.-->

</head>
<body>
<!--Aquí va todo el contenido visible de la página: texto, imágenes, botones, etc.-->

<a href="/oaa/practica8.html">volver</a>

</body>
</html>
