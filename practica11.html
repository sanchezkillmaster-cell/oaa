<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!-- la etiqueta table se utuliza para definir tablas de HTML. todo el contenido de la tabla, incluidas las filas y celdas, se coloca dento de la etiqueta -->

    <!-- la etiqueta tr se utiliza para definir una fila en una tabla. cada fila puede contener una o mas celdas, que se define utilizado las eyiquetas td (para celdas de datos) o th (para celdas de encabezado)-->

    <!--la etiqueta td definre una celda de datos dentro de una fila. cada etiqueta td reprecenta una columnas en un tabla-->

    <!--la etiqueta th define una celda de encabezado dentro de una fila. cada etiqueta th reprecenta un encabezado de columna de una tabla-->

    <table border="1"><!--etiqueta de apertura-->
            <tr>
                <td>encabezado</th> <!--celd a de ecabezado -->
                <td>encabezado</th><!--celd a de ecabezado -->
                <td>encabezado</th><!--celd a de ecabezado -->
            </tr>

            <tr>
                <td>dato 1</td> <!--celda de datos-->
                <td>dato 2</td><!--celda de datos-->
                <td>dato 3</td><!--celda de datos-->
            </tr>

                <tr>
                    <td>dato 4</td> <!--celda de datos-->
                    <td>dato 5</td><!--celda de datos-->
                    <td>dato 6</td><!--celda de datos-->
                </tr>

    </table><!--etiqueta de cierre-->


    <table border="1">
        <caption> paises y capitales </caption>
        <tr>
            <th> pais </th>
            <th> capital </th>
        </tr>

        <tr>
            <td> españa </td>
            <td> madrid </td>
        </tr>

        <tr>
            <td> francia </td>
            <td> paris </td>
        </tr>

        <tr>
            <td> italia </td>
            <td> roma </td>
        </tr>


    </table>

    <table border="1">
        <tr>
            <th colspan="4"> mundial Futbol </th>
        </tr>

        <tr>
            <td rowspan="3"> paises con mayoria de goles </td>
            <td> brasil 2 </td> <td> 230 </td>
        </tr>

        <tr>
            <td> alemania </td> <td> 180 </td>
        </tr>

        <tr>
            <td> argentina </td> <td> 150 </td>
        </tr>
    
    </table>
    
</body>
</html>
