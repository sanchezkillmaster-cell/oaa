<!DOCTYPE html>
<!-- Indica que el documento es HTML5 -->

<html lang="en">
<!-- Etiqueta raíz. "lang" define el idioma -->

<head>
    <meta charset="UTF-8">
    <!-- Permite usar caracteres especiales como tildes y ñ -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea adaptable a dispositivos móviles -->

    <title>Document</title>
    <!-- Título que aparece en la pestaña del navegador -->
</head>

<body>
<!-- Contenido visible de la página -->

    <!-- ================== TEORÍA DE ENCABEZADOS ================== -->

    <!-- <h1> a <h6> son etiquetas de encabezado -->
    <!-- Se usan para definir títulos y subtítulos -->

    <!-- <h1>: Encabezado principal (más importante) -->
    <!-- Solo se recomienda usar uno por página -->
    <h1>Título principal</h1>

    <!-- <h2>: Subtítulo del <h1> -->
    <h2>Subtítulo</h2>

    <!-- <h3>: Subnivel del <h2> -->
    <h3>Sección más específica</h3>

    <!-- <h4>: Nivel más profundo de contenido -->
    <h4>Detalle</h4>

    <!-- <h5>: Información aún más específica -->
    <h5>Subdetalle</h5>

    <!-- <h6>: Encabezado menos importante -->
    <h6>Nota final</h6>

    <!-- ================== CONCEPTOS CLAVE ================== -->

    <!-- 1. Jerarquía:
         h1 > h2 > h3 > h4 > h5 > h6 -->

    <!-- 2. Semántica:
         Indican la importancia del contenido, no solo el tamaño -->

    <!-- 3. SEO:
         Ayudan a los motores de búsqueda a entender la estructura -->

    <!-- 4. Accesibilidad:
         Lectores de pantalla usan estos niveles -->

    <!-- 5. Buenas prácticas:
         - No saltar niveles sin razón
         - No usar encabezados solo para agrandar texto -->

</body>
</html>
